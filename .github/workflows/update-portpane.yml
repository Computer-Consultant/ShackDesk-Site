# ──────────────────────────────────────────────────────────────────────────────
# ShackDesk Site — PortPane Update Feed
#
# Triggered by repository_dispatch from Computer-Tsu/ShackDesk-PortPane after
# a release build completes. Updates the per-channel Velopack feed file so that
# installed copies of PortPane can discover and download the new version.
#
# Dispatch event type : portpane-release
# Dispatch payload    : channel, version, nupkg_url, nupkg_sha256
#
# Feed format: VelopackAssetFeed (Assets array) required by Velopack's
# SimpleWebSource. File is served at portpane/update/{channel}/releases.win.json
# which Velopack constructs automatically by appending "releases.win.json" to
# the base endpoint URL configured in BrandingInfo.cs.
# ──────────────────────────────────────────────────────────────────────────────
name: Update PortPane Feed

on:
  repository_dispatch:
    types: [ portpane-release ]

jobs:
  update-feed:
    name: Update ${{ github.event.client_payload.channel }} feed
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Write Velopack feed JSON
        env:
          CHANNEL:      ${{ github.event.client_payload.channel }}
          VERSION:      ${{ github.event.client_payload.version }}
          NUPKG_URL:    ${{ github.event.client_payload.nupkg_url }}
          NUPKG_SHA256: ${{ github.event.client_payload.nupkg_sha256 }}
        run: |
          DIR="portpane/update/${CHANNEL}"
          FILE="${DIR}/releases.win.json"
          mkdir -p "$DIR"
          cat > "$FILE" <<EOF
          {
            "Assets": [
              {
                "PackageId": "PortPane",
                "Version": "${VERSION}",
                "Type": "Full",
                "FileName": "${NUPKG_URL}",
                "SHA256": "${NUPKG_SHA256}",
                "NotesMarkdown": "https://github.com/Computer-Tsu/ShackDesk-PortPane/releases/tag/v${VERSION}"
              }
            ]
          }
          EOF
          echo "Written: $FILE"
          cat "$FILE"

      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add portpane/update/
          git commit -m "update: PortPane ${{ github.event.client_payload.channel }} feed → v${{ github.event.client_payload.version }}"
          git push
